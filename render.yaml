services:
  # ── Backend API (Render Web Service) ────────────────────────────────────
  - type: web
    name: eshopnepal-api
    env: node
    region: singapore
    plan: free
    # corepack enables pnpm in Render's Node image
    installCommand: corepack enable && corepack prepare pnpm@11.3.0 --activate
    buildCommand: pnpm install --filter @eshopnepal/backend...
    startCommand: pnpm --filter @eshopnepal/backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
